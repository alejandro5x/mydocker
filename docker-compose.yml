version: '3.4'
services:
  plex-server:
    container_name: plex-server
    image: plexinc/pms-docker:latest
    restart: unless-stopped
    environment:
      - PLEX_UID=${PUID} # default user id, defined in .env 
      - PLEX_GID=${PGID} # default group id, defined in .env
      - TZ=${TZ} # timezone, defined in .env
    network_mode: host
    volumes:
      - ${ROOT}/mymedia/config/plex/db:/config # plex database
      - ${ROOT}/mymedia/config/plex/transcode:/transcode # temp transcoded files
      - ${ROOT}/hh/datos:/data # media library

  transmission:
    image: linuxserver/transmission
    container_name: transmission
    network_mode: service:vpn # run on the vpn network
    environment:
      - PUID=${PUID} # default user id, defined in .env 
      - PGID=${PGID} # default group id, defined in .env
      - TZ=${TZ} # timezone, defined in .env
    volumes:
      - ${ROOT}/mymedia/downloads:/downloads # downloads folder
      - ${ROOT}/mymedia/config/transmission:/config # config files
      - ${ROOT}/mymedia/watch:/watch # config files
    restart: unless-stopped

  vpn:
    container_name: vpn
    image: dperson/openvpn-client:latest
    cap_add:
      - net_admin # required to modify network interfaces
    restart: unless-stopped
    volumes:
      - /dev/net:/dev/net:z # tun device
      - ${ROOT}/mymedia/config/vpn:/vpn # OpenVPN configuration
    security_opt:
      - label:disable
    ports:
      - 9091:9091 #transmission
      - 51413:51413
      - 51413:51413/udp
    command: '-f "" -r 192.168.1.0/24' # enable firewall and route local network traffic

